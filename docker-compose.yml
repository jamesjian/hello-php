services:
  web:
    build: .
    ports: 
      - "8081:80"
    volumes:
      - ./index.php:/var/www/html/index.php
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}     
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
      
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h","localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network
      
volumes:
  db-data:      

networks:
  app-network: