name : Build, push and deploy

on:
  push:
    branches:
      - main
env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: hello-php
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Build , tag and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
      - name: Verify container starts
        run: |
          docker run -d -p 8081:80 --name test-container  ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          sleep 3
          curl --fail http://localhost:8081 || exit 1
          docker stop test-container
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 986232521814.dkr.ecr.ap-southeast-2.amazonaws.com  
            docker pull 986232521814.dkr.ecr.ap-southeast-2.amazonaws.com/hello-php:latest
            docker stop hello-php-app || true
            docker rm hello-php-app  || true
            docker run -d -p 80:80 --name hello-php-app 986232521814.dkr.ecr.ap-southeast-2.amazonaws.com/hello-php:latest
